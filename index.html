<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente IA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Barra superior -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="app-name">Assistente IA</span>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" title="Compartilhar" aria-label="Compartilhar">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
          <path d="M12 3v12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M7 8l5-5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 14v4a2 2 0 002 2h10a2 2 0 002-2v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="icon-btn" title="Menu" aria-label="Menu">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
          <circle cx="5" cy="12" r="1.6" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
          <circle cx="19" cy="12" r="1.6" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Área da conversa -->
  <main class="chat-area" id="chatArea">
    <div class="conversation" id="conversation">

      <div class="message user-message">
        <div class="bubble user-bubble">oi</div>
      </div>

      <div class="message ai-message">
        <div class="ai-text">Olá, Juliana! 😊 Como posso ajudar hoje?</div>
        <div class="ai-actions">
          <button class="action-icon" title="Copiar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M5 15V6a2 2 0 012-2h9" stroke="currentColor" stroke-width="1.6"/></svg>
          </button>
          <button class="action-icon" title="Curtir">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M7 11v9H4a1 1 0 01-1-1v-7a1 1 0 011-1h3zm0 0l4.5-8a2 2 0 013.5 1.3V9h4.2a2 2 0 011.98 2.3l-1.1 7A2 2 0 0117.1 20H10a3 3 0 01-3-3v-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
          <button class="action-icon" title="Não curtir">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M17 13V4h3a1 1 0 011 1v7a1 1 0 01-1 1h-3zm0 0l-4.5 8a2 2 0 01-3.5-1.3V15H4.8a2 2 0 01-1.98-2.3l1.1-7A2 2 0 015.9 4H13a3 3 0 013 3v6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
          <button class="action-icon" title="Compartilhar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2.2" stroke="currentColor" stroke-width="1.5"/><circle cx="18" cy="6" r="2.2" stroke="currentColor" stroke-width="1.5"/><circle cx="18" cy="18" r="2.2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11l8-3.5M8 13l8 3.5" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="action-icon" title="Regenerar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 11A8 8 0 105.5 16.5M20 11V5M20 11h-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Campo de prompt -->
  <div class="prompt-bar-wrapper">
    <div class="prompt-bar">
      <button class="round-btn plus-btn" title="Adicionar" aria-label="Adicionar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <textarea class="prompt-input" placeholder="Pergunte alguma coisa" id="promptInput" rows="1"></textarea>
      <button class="round-btn mic-btn" title="Microfone" aria-label="Microfone">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="1.7"/><path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
      <button class="round-btn send-btn" id="sendBtn" title="Enviar" aria-label="Enviar">
        <svg class="send-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M4 20l16-8L4 4l2 7 9 1-9 1-2 7z" fill="white"/>
        </svg>
        <svg class="spinner" width="17" height="17" viewBox="0 0 24 24" fill="none">
          <path d="M12 3a9 9 0 019 9" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Botão SEBRAE + termômetro -->
  <div class="sebrae-widget">
    <div class="thermometer" id="thermometer">
      <div class="thermo-track">
        <div class="thermo-zone zone-red"></div>
        <div class="thermo-zone zone-yellow"></div>
        <div class="thermo-zone zone-green"></div>
      </div>
      <div class="thermo-indicator" id="thermoIndicator"></div>
    </div>
    <button class="sebrae-btn" id="sebraeBtn" title="Assistente SEBRAE">SEBRAE</button>
  </div>

  <!-- Toast de bloqueio de envio -->
  <div class="block-toast" id="blockToast">
    <div class="block-toast-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 8v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="15.5" r="1" fill="currentColor"/>
      </svg>
    </div>
    <div class="block-toast-text">
      <div class="block-toast-title">Prompt bloqueado</div>
      <div class="block-toast-desc">Detectamos informações sensíveis que impedem o envio deste prompt para uma IA não homologada.</div>
    </div>
  </div>

  <!-- Overlay de fundo do painel -->
  <div class="panel-overlay" id="panelOverlay"></div>

  <!-- Painel lateral -->
  <aside class="side-panel" id="sidePanel">
    <div class="panel-header">
      <span class="panel-brand">Assistente SEBRAE</span>
      <button class="panel-close" id="panelClose" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="panel-content" id="panelContent">
      <!-- Conteúdo injetado via JS -->
    </div>
  </aside>

<script src="script.js"></script>
</body>
</html>
